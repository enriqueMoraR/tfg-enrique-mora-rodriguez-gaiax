server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location = /api/fhir {
    return 301 /api/fhir/;
  }

  location /api/fhir/ {
    proxy_pass http://provider:8081/api/fhir/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/v1/historial/ {
    proxy_pass http://provider:8081/api/v1/historial/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /api/v1/proveedores {
    proxy_pass http://provider:8081/api/v1/proveedores;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location /api/v1/ {
    proxy_pass http://consumer:8080/api/v1/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  location = /api/health/provider {
    proxy_pass http://provider:8081/actuator/health;
    proxy_set_header Host $host;
  }

  location = /api/health/trust {
    proxy_pass http://trust:8080/actuator/health;
    proxy_set_header Host $host;
  }

  location = /api/health/consumer {
    proxy_pass http://consumer:8080/actuator/health;
    proxy_set_header Host $host;
  }

  location = /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
